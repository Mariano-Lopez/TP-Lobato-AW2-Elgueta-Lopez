<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD - Subir Archivo con Multer</title>
</head>

<body>
    <!-- Si no ponemos el dominio, el navegador asume que es el mismo desde donde se sirve la web -->
    <form action="/api/v1/productos" method="post" enctype="multipart/form-data">
        <input type="text" name="nombre" id="">
        <input type="text" name="" id="precio">
        <input type="text" name="categoria" id="">

        <input type="file" name="archivo" id="">
        <button type="submit">Subir</button>
    </form>
</body>

</html>
