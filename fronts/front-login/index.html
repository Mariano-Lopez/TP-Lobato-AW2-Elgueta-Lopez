<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>LOGIN</title>
        <style>
            body {
                background: #f5f6fa;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: Arial, sans-serif;
            }
            form {
                background: #fff;
                padding: 2rem 2.5rem;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                display: flex;
                flex-direction: column;
                gap: 0.2rem;
                min-width: 300px;
            }
            label {
                font-weight: 500;
                margin-bottom: 0.2rem;
            }
            input[type='text'],
            input[type='password'] {
                width: 100%;
                padding: 0.5rem;
                border: 1px solid #ccc;
                border-radius: 4px;
                margin-top: 0.25rem;
                font-size: 1rem;
            }
            button[type='submit'] {
                background: #3498db;
                color: #fff;
                border: none;
                padding: 0.7rem;
                border-radius: 4px;
                font-size: 1rem;
                cursor: pointer;
                transition: background 0.2s;
            }
            button[type='submit']:hover {
                background: #217dbb;
            }
            .error-message {
                display: none;
                margin-top: 1rem;
                padding: 0.75rem 1rem;
                background: #ffe5e5;
                border: 1px solid #f5a6a6;
                border-radius: 4px;
                color: #8b0000;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <form id="form" action="/autenticar" method="post">
            <label for="usuario">
                Usuario:
                <br />
                <input
                    type="text"
                    id="usuario"
                    name="usuario"
                    required
                />
            </label>
            <br />
            <label for="pass">
                Password:
                <br />
                <input
                    type="password"
                    id="pass"
                    name="pass"
                    required
                />
            </label>
            <br />
            <button type="submit">Ingresar</button>
            <br />
            <div id="error-message" class="error-message" aria-live="polite"></div>
        </form>
        <script>
            const form = document.getElementById('form');
            const errorMessageEl = document.getElementById('error-message');

            function showError(message) {
                errorMessageEl.textContent = message;
                errorMessageEl.style.display = 'block';
            }

            function clearError() {
                errorMessageEl.textContent = '';
                errorMessageEl.style.display = 'none';
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                clearError();

                const usuario = document.getElementById('usuario').value;
                const pass = document.getElementById('pass').value;

                try {
                    const response = await fetch('/autenticar', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ usuario, pass }),
                    });

                    if (!response.ok) {
                        showError('Usuario y/o contraseña incorrecta');
                        form.reset();
                        return;
                    }

                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        window.location.href = '/admin';
                    }
                } catch (error) {
                    showError('Error de conexión. Intente nuevamente.');
                }
            });
        </script>
    </body>
</html>
